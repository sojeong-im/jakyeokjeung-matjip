<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자격증 맛집 | 관리자 대시보드</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 40px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }
    .admin-title {
      font-size: 2rem;
      font-weight: 800;
    }
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .admin-table th, .admin-table td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .admin-table th {
      background: rgba(192, 80, 255, 0.08);
      color: var(--primary-light);
      font-weight: 700;
      white-space: nowrap;
    }
    .admin-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }
    .delete-btn {
      background: rgba(255, 77, 109, 0.15);
      color: var(--error);
      border: 1px solid rgba(255, 77, 109, 0.3);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .delete-btn:hover {
      background: var(--error);
      color: #fff;
    }
    
    /* Login Overlay */
    #loginOverlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: var(--radius);
      text-align: center;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .login-box h2 {
      margin-bottom: 20px;
      font-weight: 800;
    }
    .login-input {
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 2px;
    }

    /* Mobile Responsive Styles */
    @media (max-width: 768px) {
      .admin-container {
        margin: 30px auto;
        padding: 0 15px;
      }
      .admin-header {
        flex-direction: column;
        gap: 15px;
        align-items: flex-start;
      }
      .admin-title {
        font-size: 1.5rem;
      }
      .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .admin-table th, .admin-table td {
        padding: 12px 15px;
        font-size: 0.85rem;
        white-space: nowrap;
      }
      .login-box {
        padding: 30px 20px;
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

  <!-- Login Form -->
  <div id="loginOverlay">
    <div class="login-box">
      <h2>🔒 관리자 로그인</h2>
      <input type="password" id="adminPwd" class="form-input login-input" placeholder="비밀번호 4자리" maxlength="4" />
      <button class="btn-primary full-width" id="loginBtn">대시보드 접속</button>
      <p id="loginError" style="color: var(--error); font-size: 0.8rem; margin-top: 10px; display: none;">비밀번호가 틀렸습니다.</p>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div class="admin-container hidden" id="adminDashboard">
    <div class="admin-header">
      <h1 class="admin-title">지원자 관리 <span style="font-size: 1rem; color: var(--text-muted); font-weight: 500;">(총 <span id="totalCount">0</span>명)</span></h1>
      <a href="index.html" class="btn-ghost small">← 메인으로</a>
    </div>

    <div class="table-wrapper">
      <table class="admin-table">
        <thead>
          <tr>
            <th>지원 일시</th>
            <th>이름</th>
            <th>대학 / 학과</th>
            <th>출생연도</th>
            <th>희망 반</th>
            <th>연락처</th>
            <th>지하철역</th>
            <th>한마디</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="applicantList">
          <tr><td colspan="9" style="text-align:center; padding: 40px; color: var(--text-muted);">지원서 데이터를 불러오는 중입니다...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
  <script src="admin.js"></script>
</body>
</html>
